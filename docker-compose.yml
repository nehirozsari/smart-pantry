services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-pantry-db
    environment:
      POSTGRES_DB: smart_pantry
      POSTGRES_USER: smart_pantry
      POSTGRES_PASSWORD: smart_pantry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_pantry -d smart_pantry"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build: .
    container_name: smart-pantry-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
