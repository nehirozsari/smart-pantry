spring:
  datasource:
    url: jdbc:h2:mem:smart_pantry_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none

  flyway:
    enabled: false

app:
  jwt:
    secret: unit-test-jwt-secret-key-at-least-32-chars
    access-token-expiration: 15m
    refresh-token-expiration: 7d

logging:
  level:
    root: WARN
